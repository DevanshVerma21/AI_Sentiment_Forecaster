version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongo:27017/ai_project_db}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # Optional: scheduled alert checks
  alerts:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "alerts.alert_engine", "--interval", "3600"]
    env_file:
      - backend/.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
