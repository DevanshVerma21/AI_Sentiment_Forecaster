# TrendAI Configuration
# Alerts thresholds and pipeline settings

alerts:
  thresholds:
    sentiment_spike_percent: 20      # % change triggers alert
    sentiment_drop_percent: 15       # % negative change triggers alert
    topic_surge_percent: 30          # % increase in topic mentions
    negative_trend_slope: -0.1       # slope below this triggers alert
    volume_spike_multiplier: 2.0     # mentions > multiplier * avg triggers alert
    min_negative_reviews: 3          # minimum negatives before quality alert

  severity_escalation:
    critical_threshold: 40           # % change above this = CRITICAL
    warning_threshold: 20            # % change above this = WARNING

  notification:
    console: true
    log_file: "logs/alerts.log"
    email:
      enabled: false
      smtp_host: ""
      smtp_port: 587
      sender: ""
      recipients: []
    slack:
      enabled: false
      webhook_url: ""

pipeline:
  data:
    processed_dir: "data/processed"
    enriched_dir: "data/enriched"
    analytics_dir: "data/analytics"
    raw_csv_dir: "output"

  sentiment:
    model: "cardiffnlp/twitter-roberta-base-sentiment"
    batch_size: 32
    use_llm_enhanced: true   # Use Groq LLM for enhanced analysis

  topics:
    method: "keybert"        # keybert or bertopic
    num_topics: 10
    top_n_keywords: 5

  reports:
    output_dir: "reports"
    default_period: "weekly"
    formats:
      - pdf
      - xlsx
