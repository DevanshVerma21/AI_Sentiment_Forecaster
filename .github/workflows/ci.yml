name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyarrow pyyaml keybert pytest

      - name: Run data pipeline tests
        # ML model tests (test_models.py) require large downloads — run locally only
        run: pytest tests/test_data_pipeline.py -v

      - name: Check backend syntax
        run: |
          python -m py_compile backend/server.py
          python -m py_compile backend/oauth2.py
          python -m py_compile backend/routers/analytics_routes.py
          python -m py_compile backend/routers/rag_routes.py

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
